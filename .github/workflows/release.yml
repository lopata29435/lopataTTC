name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # Fail-fast gate: the git tag, src-tauri/Cargo.toml `version`, and root
  # package.json `version` must all agree before we burn CI minutes building
  # six platforms. Skipped on manual `workflow_dispatch` runs because there's
  # no tag in that case.
  verify-versions:
    name: Verify version consistency
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compare tag / Cargo.toml / package.json
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          TAG_VERSION="${TAG#v}"
          CARGO_VERSION=$(sed -nE 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' src-tauri/Cargo.toml | head -n1)
          PKG_VERSION=$(python3 -c "import json,sys; print(json.load(open('package.json'))['version'])")

          echo "tag        : $TAG_VERSION"
          echo "Cargo.toml : $CARGO_VERSION"
          echo "package.json: $PKG_VERSION"

          if [ "$TAG_VERSION" != "$CARGO_VERSION" ] || [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Versions are out of sync. Bump src-tauri/Cargo.toml and package.json to '$TAG_VERSION' before tagging."
            exit 1
          fi

  build:
    # Depend on the version check when this run was triggered by a tag push.
    # `needs` lists the job; if it was skipped (manual dispatch) the build still
    # runs thanks to the `always()` + dependency-success guard.
    needs: verify-versions
    if: always() && (needs.verify-versions.result == 'success' || needs.verify-versions.result == 'skipped')
    permissions:
      contents: write
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- Windows ----
          - label: 'Windows x86_64'
            os: 'windows-latest'
            rust_target: 'x86_64-pc-windows-msvc'
            cache_key: 'win-x86_64'
            client_os: 'windows'
            client_arch: 'x86_64'
            tauri_args: '--target x86_64-pc-windows-msvc'

          - label: 'Windows i686 (32-bit)'
            os: 'windows-latest'
            rust_target: 'i686-pc-windows-msvc'
            cache_key: 'win-i686'
            client_os: 'windows'
            client_arch: 'i686'
            tauri_args: '--target i686-pc-windows-msvc'

          - label: 'Windows aarch64 (ARM64)'
            os: 'windows-latest'
            rust_target: 'aarch64-pc-windows-msvc'
            cache_key: 'win-aarch64'
            client_os: 'windows'
            client_arch: 'aarch64'
            tauri_args: '--target aarch64-pc-windows-msvc'

          # ---- macOS ----
          - label: 'macOS universal'
            os: 'macos-latest'
            rust_target: 'aarch64-apple-darwin,x86_64-apple-darwin'
            cache_key: 'macos-universal'
            client_os: 'macos'
            client_arch: 'universal'
            tauri_args: '--target universal-apple-darwin'

          # ---- Linux ----
          - label: 'Linux x86_64'
            os: 'ubuntu-22.04'
            rust_target: 'x86_64-unknown-linux-gnu'
            cache_key: 'linux-x86_64'
            client_os: 'linux'
            client_arch: 'x86_64'
            tauri_args: ''

          # Linux ARM64: requires native ARM runner. ubuntu-22.04-arm is available
          # for public OSS repos on GitHub-hosted runners. If your repo is private
          # or this runner image is not yet provisioned, this job will queue
          # forever — comment it out or swap for a self-hosted ARM runner.
          - label: 'Linux aarch64'
            os: 'ubuntu-22.04-arm'
            rust_target: 'aarch64-unknown-linux-gnu'
            cache_key: 'linux-aarch64'
            client_os: 'linux'
            client_arch: 'aarch64'
            tauri_args: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.cache_key }}

      - name: Install Linux build deps
        if: matrix.client_os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf \
            xdg-utils

      # NOTE: The TrustTunnel client binary is intentionally NOT bundled into the
      # installer. The GUI downloads the latest release of
      # https://github.com/TrustTunnel/TrustTunnelClient on first launch
      # (see src-tauri/src/updater.rs). This keeps the installer small and the
      # client always up-to-date without us cutting new GUI releases.
      #
      # If you ever want offline-capable first-launch, run
      # `scripts/fetch-client.{sh,ps1}` here before `tauri-action` and bundle
      # the result via tauri.conf.json -> bundle.resources.

      - name: Build & upload via tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'TrustTunnel GUI ${{ github.ref_name }}'
          releaseBody: |
            Автоматический релиз. Установщики:
            - Windows: `.msi` / `.exe` (NSIS)
            - macOS: `.dmg`
            - Linux: `.AppImage` / `.deb` / `.rpm`

            Встроенный `trusttunnel_client` подкачивается из релизов TrustTunnel автоматически
            при первом запуске, если в системе нет новой версии.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri_args }}
