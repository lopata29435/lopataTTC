name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# tauri-action creates the GitHub release and uploads assets — the workflow
# token needs contents:write everywhere (job-level grants alone proved
# insufficient with the repo's previous "read" default).
permissions:
  contents: write

jobs:
  # Fail-fast gate: the git tag, src-tauri/Cargo.toml `version`, and root
  # package.json `version` must all agree before we burn CI minutes building
  # six platforms. Skipped on manual `workflow_dispatch` runs because there's
  # no tag in that case.
  verify-versions:
    name: Verify version consistency
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Compare tag / Cargo.toml / package.json
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          TAG_VERSION="${TAG#v}"
          CARGO_VERSION=$(sed -nE 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' src-tauri/Cargo.toml | head -n1)
          PKG_VERSION=$(python3 -c "import json,sys; print(json.load(open('package.json'))['version'])")

          echo "tag        : $TAG_VERSION"
          echo "Cargo.toml : $CARGO_VERSION"
          echo "package.json: $PKG_VERSION"

          if [ "$TAG_VERSION" != "$CARGO_VERSION" ] || [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Versions are out of sync. Bump src-tauri/Cargo.toml and package.json to '$TAG_VERSION' before tagging."
            exit 1
          fi

          # tauri.conf.json must NOT carry its own "version" — Cargo.toml is
          # the single source of truth (a stale value here once shipped a
          # v0.1.1 release whose artifacts were all versioned 0.1.0).
          if python3 -c "import json,sys; sys.exit(0 if 'version' in json.load(open('src-tauri/tauri.conf.json')) else 1)"; then
            echo "::error::src-tauri/tauri.conf.json contains a 'version' key. Remove it — the version comes from Cargo.toml."
            exit 1
          fi

  # Create the draft release up-front. tauri-action can create it too, but
  # release creation by GITHUB_TOKEN fails with "Resource not accessible by
  # integration" when the tag no longer points at the branch head (a known
  # GitHub limitation). Right after the tag push that's almost never the case,
  # and the build jobs then only *upload* into the existing draft.
  create-draft:
    name: Create draft release
    needs: verify-versions
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create draft if it does not exist
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping creation."
            exit 0
          fi

          # Download table only — asset names are predictable from the
          # version, so we can link them before the builds upload anything.
          VER="${TAG#v}"
          BASE="https://github.com/$GITHUB_REPOSITORY/releases/download/$TAG"
          cat > notes.md <<EOF
          | Your system | Download |
          |---|---|
          | **Windows 10/11** | **[Lopata_${VER}_x64-setup.exe]($BASE/Lopata_${VER}_x64-setup.exe)** |
          | Windows on ARM | [Lopata_${VER}_arm64-setup.exe]($BASE/Lopata_${VER}_arm64-setup.exe) |
          | Windows 32-bit | [Lopata_${VER}_x86-setup.exe]($BASE/Lopata_${VER}_x86-setup.exe) |
          | **macOS** (Intel & Apple Silicon) | [Lopata_${VER}_universal.dmg]($BASE/Lopata_${VER}_universal.dmg) |
          | **Ubuntu / Debian / Mint** | [Lopata_${VER}_amd64.deb]($BASE/Lopata_${VER}_amd64.deb) |
          | Fedora / openSUSE | [Lopata-${VER}-1.x86_64.rpm]($BASE/Lopata-${VER}-1.x86_64.rpm) |
          | Any Linux (portable) | [Lopata_${VER}_amd64.AppImage]($BASE/Lopata_${VER}_amd64.AppImage) |
          | Linux ARM64 | [.deb]($BASE/Lopata_${VER}_arm64.deb) · [.rpm]($BASE/Lopata-${VER}-1.aarch64.rpm) · [.AppImage]($BASE/Lopata_${VER}_aarch64.AppImage) |
          EOF

          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --draft \
            --title "Lopata $TAG" \
            --notes-file notes.md

  build:
    # Depend on the version check when this run was triggered by a tag push.
    # `needs` lists the jobs; if they were skipped (manual dispatch) the build
    # still runs thanks to the `always()` + dependency-success guard.
    needs: [verify-versions, create-draft]
    if: always() && (needs.verify-versions.result == 'success' || needs.verify-versions.result == 'skipped') && (needs.create-draft.result == 'success' || needs.create-draft.result == 'skipped')
    permissions:
      contents: write
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- Windows ----
          - label: 'Windows x86_64'
            os: 'windows-latest'
            rust_target: 'x86_64-pc-windows-msvc'
            cache_key: 'win-x86_64'
            client_os: 'windows'
            client_arch: 'x86_64'
            tauri_args: '--target x86_64-pc-windows-msvc'

          - label: 'Windows i686 (32-bit)'
            os: 'windows-latest'
            rust_target: 'i686-pc-windows-msvc'
            cache_key: 'win-i686'
            client_os: 'windows'
            client_arch: 'i686'
            tauri_args: '--target i686-pc-windows-msvc'

          - label: 'Windows aarch64 (ARM64)'
            os: 'windows-latest'
            rust_target: 'aarch64-pc-windows-msvc'
            cache_key: 'win-aarch64'
            client_os: 'windows'
            client_arch: 'aarch64'
            tauri_args: '--target aarch64-pc-windows-msvc'

          # ---- macOS ----
          - label: 'macOS universal'
            os: 'macos-latest'
            rust_target: 'aarch64-apple-darwin,x86_64-apple-darwin'
            cache_key: 'macos-universal'
            client_os: 'macos'
            client_arch: 'universal'
            tauri_args: '--target universal-apple-darwin'

          # ---- Linux ----
          - label: 'Linux x86_64'
            os: 'ubuntu-22.04'
            rust_target: 'x86_64-unknown-linux-gnu'
            cache_key: 'linux-x86_64'
            client_os: 'linux'
            client_arch: 'x86_64'
            tauri_args: ''

          # Linux ARM64: requires native ARM runner. ubuntu-22.04-arm is available
          # for public OSS repos on GitHub-hosted runners. If your repo is private
          # or this runner image is not yet provisioned, this job will queue
          # forever — comment it out or swap for a self-hosted ARM runner.
          - label: 'Linux aarch64'
            os: 'ubuntu-22.04-arm'
            rust_target: 'aarch64-unknown-linux-gnu'
            cache_key: 'linux-aarch64'
            client_os: 'linux'
            client_arch: 'aarch64'
            tauri_args: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.cache_key }}

      - name: Install Linux build deps
        if: matrix.client_os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf \
            xdg-utils

      # NOTE: The TrustTunnel client binary is intentionally NOT bundled into the
      # installer. The GUI downloads the latest release of
      # https://github.com/TrustTunnel/TrustTunnelClient on first launch
      # (see src-tauri/src/updater.rs). This keeps the installer small and the
      # client always up-to-date without us cutting new GUI releases.
      #
      # If you ever want offline-capable first-launch, run
      # `scripts/fetch-client.{sh,ps1}` here before `tauri-action` and bundle
      # the result via tauri.conf.json -> bundle.resources.

      - name: Build & upload via tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Set these GitHub Secrets to enable signed in-app updates.
          # Generate the keypair once with `cargo tauri signer generate -w ~/.tauri/myapp.key`
          # then put the contents of myapp.key (base64 blob) into TAURI_SIGNING_PRIVATE_KEY
          # and the password (if any) into TAURI_SIGNING_PRIVATE_KEY_PASSWORD.
          # The matching public key goes into tauri.conf.json -> plugins.updater.pubkey.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Lopata ${{ github.ref_name }}'
          # No releaseBody here: the create-draft job already wrote the
          # download guide and we don't want it overwritten.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.tauri_args }}

  # Publish the draft once every platform finished uploading. Without this the
  # release stays draft forever and the in-app updater endpoint
  # (/releases/latest/download/latest.json) returns 404 — i.e. no auto-updates.
  publish:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Verify updater manifest and publish
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          ASSETS=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')
          echo "Release assets:"
          echo "$ASSETS"

          if ! echo "$ASSETS" | grep -qx 'latest.json'; then
            echo "::error::latest.json is missing from the release — updater signing/manifest generation failed. Not publishing."
            exit 1
          fi
          if ! echo "$ASSETS" | grep -q '\.sig$'; then
            echo "::error::No .sig files in the release — TAURI_SIGNING_PRIVATE_KEY is missing or invalid. Not publishing."
            exit 1
          fi

          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false --latest
          echo "Release $TAG published."
