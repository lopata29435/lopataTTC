name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- Windows ----
          - label: 'Windows x86_64'
            os: 'windows-latest'
            rust_target: 'x86_64-pc-windows-msvc'
            client_os: 'windows'
            client_arch: 'x86_64'
            tauri_args: '--target x86_64-pc-windows-msvc'

          - label: 'Windows i686 (32-bit)'
            os: 'windows-latest'
            rust_target: 'i686-pc-windows-msvc'
            client_os: 'windows'
            client_arch: 'i686'
            tauri_args: '--target i686-pc-windows-msvc'

          - label: 'Windows aarch64 (ARM64)'
            os: 'windows-latest'
            rust_target: 'aarch64-pc-windows-msvc'
            client_os: 'windows'
            client_arch: 'aarch64'
            tauri_args: '--target aarch64-pc-windows-msvc'

          # ---- macOS ----
          - label: 'macOS universal'
            os: 'macos-latest'
            rust_target: 'aarch64-apple-darwin,x86_64-apple-darwin'
            client_os: 'macos'
            client_arch: 'universal'
            tauri_args: '--target universal-apple-darwin'

          # ---- Linux ----
          - label: 'Linux x86_64'
            os: 'ubuntu-22.04'
            rust_target: 'x86_64-unknown-linux-gnu'
            client_os: 'linux'
            client_arch: 'x86_64'
            tauri_args: ''

          # Linux ARM64: requires native ARM runner. ubuntu-22.04-arm is available
          # for public OSS repos on GitHub-hosted runners. If your repo is private
          # or this runner image is not yet provisioned, this job will queue
          # forever — comment it out or swap for a self-hosted ARM runner.
          - label: 'Linux aarch64'
            os: 'ubuntu-22.04-arm'
            rust_target: 'aarch64-unknown-linux-gnu'
            client_os: 'linux'
            client_arch: 'aarch64'
            tauri_args: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.rust_target }}

      - name: Install Linux build deps
        if: matrix.client_os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Fetch TrustTunnel client binary (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x scripts/fetch-client.sh
          scripts/fetch-client.sh --os ${{ matrix.client_os }} --arch ${{ matrix.client_arch }}

      - name: Fetch TrustTunnel client binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\scripts\fetch-client.ps1 -Os ${{ matrix.client_os }} -Arch ${{ matrix.client_arch }}

      - name: Build & upload via tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'TrustTunnel GUI ${{ github.ref_name }}'
          releaseBody: |
            Автоматический релиз. Установщики:
            - Windows: `.msi` / `.exe` (NSIS)
            - macOS: `.dmg`
            - Linux: `.AppImage` / `.deb` / `.rpm`

            Встроенный `trusttunnel_client` подкачивается из релизов TrustTunnel автоматически
            при первом запуске, если в системе нет новой версии.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri_args }}
